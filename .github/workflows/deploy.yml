name: Deploy Next.js to EC2

on:
  push:
    branches:
      - main   # triggers on every push to main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code (on GitHub's server)
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. SSH into EC2 and deploy
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Load nvm so node/npm commands work
            export NVM_DIR="$HOME/.nvm"
            source "$NVM_DIR/nvm.sh"

            # Go to your app folder
            cd /var/www/zestnbloom

            # Pull latest code from GitHub
            git pull origin main

            # Install any new dependencies
            npm install

            # Build the Next.js app
            npm run build

            # Restart app with PM2 (zero downtime)
            pm2 restart zest-bloom

            echo "✅ Deployment done!"
